<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Flyers</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para traducir el código en vivo -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white">

    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <h1 class="text-xl">Cargando aplicación...</h1>
        </div>
    </div>

    <script type="text/babel">
        // Esperamos a que todo cargue antes de intentar renderizar
        window.addEventListener('load', () => {
            try {
                const { useState } = React;
                
                function App() {
                    return (
                        <div className="p-10 text-center">
                            <h1 className="text-4xl font-bold text-blue-400">¡Funciona!</h1>
                            <p className="mt-4 text-gray-300">Si ves esto, React está renderizando correctamente.</p>
                        </div>
                    );
                }
                
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } catch (error) {
                document.getElementById('root').innerHTML = `
                    <div class="p-10 text-red-500">
                        <h1 class="text-2xl font-bold">Error al iniciar:</h1>
                        <pre class="mt-4 bg-gray-800 p-4 rounded">${error.message}</pre>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
