<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Flyers Automotores - Elegancia Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0d0d0d;
            color: #f3f4f6;
        }
        .text-neon-red {
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.7), 0 0 20px rgba(220, 38, 38, 0.4);
        }
        .border-neon-red {
            box-shadow: 0 0 12px rgba(220, 38, 38, 0.5);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function FlyerGenerator() {
            // Textos configurables (Se llenan con valores iniciales idénticos a tu foto)
            const [brand, setBrand] = useState("VOLKSWAGEN");
            const [model, setModel] = useState("TERA");
            const [topText, setTopText] = useState("RETIRÁ TU PRÓXIMO");
            const [deliveryDays, setDeliveryDays] = useState("DE 7 A 15 DÍAS");
            const [middleText1, setMiddleText1] = useState("SUBITE A MÁS DISEÑO, TECNOLOGÍA Y CONFORT.");
            const [middleText2, setMiddleText2] = useState("SUBITE A MÁS TERA.");
            const [feature1Title, setFeature1Title] = useState("FINANCIACIONES");
            const [feature1Bold, setFeature1Bold] = useState("FLEXIBLES");
            const [feature1Sub, setFeature1Sub] = useState("ADAPTADAS A VOS");
            const [feature2Title, setFeature2Title] = useState("HACEMOS");
            const [feature2Bold, setFeature2Bold] = useState("LLAVE POR LLAVE");
            const [feature2Sub, setFeature2Sub] = useState("PARA QUE NO TE QUEDES A PIE");
            const [feature3Title, setFeature3Title] = useState("PLANES A TU MEDIDA");
            const [feature3Bold, setFeature3Bold] = useState("CON CUOTAS QUE");
            const [feature3Sub, setFeature3Sub] = useState("SE ADAPTAN A VOS");
            const [stockMain, setStockMain] = useState("AMPLIO STOCK DISPONIBLE");
            const [stockSub, setStockSub] = useState("UNIDADES CON ENTREGA ASEGURADA");
            const [stockQuery, setStockQuery] = useState("CONSULTÁ POR VERSIONES Y COLORES");
            const [ctaText, setCtaText] = useState("¡CONSULTANOS AHORA!");
            const [ctaSub, setCtaSub] = useState("TE ASESORAMOS Y RESERVÁS TU TERA");

            // Estado de la foto del auto (inicia con un auto genérico dibujado en código)
            const [carImage, setCarImage] = useState("");
            const [isExporting, setIsExporting] = useState(false);
            const flyerRef = useRef(null);

            useEffect(() => {
                setCarImage("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 300' fill='none'><path d='M150 180 L200 120 L400 120 L480 170 L520 180 L540 210 L60 210 Z' fill='%23222' stroke='%23dc2626' stroke-width='3'/><circle cx='160' cy='210' r='35' fill='%23111' stroke='%23fff' stroke-width='2'/><circle cx='440' cy='210' r='35' fill='%23111' stroke='%23fff' stroke-width='2'/></svg>");
            }, []);

            // Lógica para cargar cualquier foto desde tu computadora
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setCarImage(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Lógica para renderizar la imagen HD y descargarla
            const exportFlyer = () => {
                if (!flyerRef.current) return;
                setIsExporting(true);
                
                setTimeout(() => {
                    html2canvas(flyerRef.current, {
                        scale: 2.5, // Duplica la resolución para excelente calidad en WhatsApp/Redes
                        useCORS: true,
                        backgroundColor: "#0a0a0a"
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Flyer_${brand}_${model}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        setIsExporting(false);
                    }).catch(err => {
                        console.error("Error al generar imagen:", err);
                        setIsExporting(false);
                    });
                }, 100);
            };

            return (
                <div class="flex flex-col lg:flex-row min-h-screen">
                    
                    {/* PANEL DE CONTROL (Izquierda) */}
                    <div class="w-full lg:w-1/3 bg-neutral-900 p-6 overflow-y-auto max-h-screen no-scrollbar">
                        <div class="mb-6">
                            <h1 class="text-xl font-black text-white tracking-tight flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></span>
                                GENERADOR DE FLYERS
                            </h1>
                        </div>

                        {/* CARGA DE FOTOS */}
                        <div class="bg-black/40 border border-zinc-800 rounded-xl p-4 mb-5">
                            <h2 class="text-sm font-bold text-red-500 uppercase mb-3">Foto del Vehículo (PNG recomendado)</h2>
                            <label class="w-full bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-bold py-2.5 px-4 rounded-lg cursor-pointer transition text-center border border-zinc-700 block">
                                📸 Seleccionar Foto Local
                                <input type="file" accept="image/*" onChange={handleImageUpload} class="hidden" />
                            </label>
                            <button class="w-full mt-2 bg-blue-600/20 text-blue-400 text-xs font-bold py-2.5 px-4 rounded-lg border border-blue-500/30">
                                🤖 Integración Drive (Ver Archivo)
                            </button>
                        </div>

                        {/* FORMULARIOS DE TEXTO */}
                        <div class="space-y-4 bg-black/20 p-2 rounded-xl">
                            <h2 class="text-xs font-bold text-zinc-400 uppercase">Textos Principales</h2>
                            <input type="text" value={topText} onChange={(e) => setTopText(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-white" />
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" value={brand} onChange={(e) => setBrand(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-white font-bold" />
                                <input type="text" value={model} onChange={(e) => setModel(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-red-500 font-bold" />
                            </div>
                            <input type="text" value={deliveryDays} onChange={(e) => setDeliveryDays(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-white" />
                            
                            {/* Subtítulos */}
                            <h2 class="text-xs font-bold text-zinc-400 uppercase pt-3">Descripción</h2>
                            <input type="text" value={middleText1} onChange={(e) => setMiddleText1(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-xs text-white" />
                            <input type="text" value={middleText2} onChange={(e) => setMiddleText2(e.target.value)} class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-xs text-white" />
                        </div>

                        <div class="mt-8">
                            <button onClick={exportFlyer} disabled={isExporting} class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-4 rounded-xl shadow-lg border border-red-400 transition">
                                {isExporting ? "Generando Imagen HD..." : "🚀 DESCARGAR FLYER"}
                            </button>
                        </div>
                    </div>

                    {/* CANVAS DE DISEÑO - TEMÁTICA ELEGANCIA PREMIUM (Derecha) */}
                    <div class="w-full lg:w-2/3 bg-neutral-950 flex items-center justify-center p-8">
                        <div ref={flyerRef} class="relative bg-[#0a0a0a] overflow-hidden select-none border border-zinc-900" style={{ width: '500px', height: '625px', minWidth: '500px', minHeight: '625px' }}>
                            
                            {/* Luces y Neones de fondo */}
                            <div class="absolute top-[-50px] left-[-50px] w-72 h-72 bg-red-600/10 rounded-full blur-[80px]"></div>
                            <div class="absolute top-[120px] right-[-50px] w-64 h-64 bg-red-600/10 rounded-full blur-[70px]"></div>
                            
                            {/* Logos Superiores */}
                            <div class="absolute top-4 left-5 z-20 flex items-center justify-center w-14 h-14 bg-black/90 rounded-full border-2 border-red-600 border-neon-red">
                                <span class="text-red-600 font-black text-2xl italic">G</span>
                            </div>
                            <div class="absolute top-5 right-5 z-20 w-12 h-12 rounded-full border border-blue-500/40 bg-black/70 flex items-center justify-center shadow-[0_0_10px_rgba(59,130,246,0.3)]">
                                <span class="text-blue-400 font-black text-xl italic">VW</span>
                            </div>

                            {/* Badge Entrega Rápida */}
                            <div class="absolute top-24 left-5 z-20 flex items-center gap-2 bg-black/70 border border-red-600/40 px-2.5 py-1 rounded-lg backdrop-blur-xs">
                                <div class="text-left leading-none">
                                    <div class="text-[9px] font-black text-red-500 uppercase">ENTREGA</div>
                                    <div class="text-[10px] font-black text-white uppercase">RÁPIDA</div>
                                </div>
                            </div>

                            {/* Textos Principales y Títulos */}
                            <div class="absolute top-4 left-0 right-0 z-10 text-center pt-2 px-16">
                                <p class="text-white text-[10px] font-bold tracking-[0.25em] uppercase">{topText}</p>
                                <h2 class="text-white text-4xl font-black italic tracking-tighter uppercase">{brand}</h2>
                                <h3 class="text-5xl font-black italic tracking-tighter uppercase text-zinc-300 drop-shadow-md">{model}</h3>
                                <div class="inline-block bg-red-600 text-white font-black italic text-[11px] px-5 py-0.5 mt-2 transform -skew-x-12">{deliveryDays}</div>
                            </div>

                            {/* Auto Central */}
                            <div class="absolute top-[145px] left-0 right-0 h-[240px] z-10 flex items-center justify-center">
                                <img src={carImage} class="max-w-[95%] max-h-[90%] object-contain relative z-10 drop-shadow-[0_15px_15px_rgba(0,0,0,0.75)]"/>
                            </div>

                            {/* Eslogans */}
                            <div class="absolute bottom-[198px] left-0 right-0 z-20 text-center px-6">
                                <p class="text-zinc-300 text-[10px] font-bold italic uppercase">{middleText1}</p>
                                <p class="text-white text-[16px] font-black italic uppercase mt-0.5">SUBITE A MÁS <span class="text-red-600 text-neon-red">{model}</span>.</p>
                            </div>

                            {/* Grilla 3 Opciones (Finanzas, Llaves, Planes) */}
                            <div class="absolute bottom-[108px] left-0 right-0 z-20 px-4">
                                <div class="grid grid-cols-3 gap-2 text-center">
                                    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-2 min-h-[66px]">
                                        <div class="text-red-500 font-bold text-lg mb-1">$</div>
                                        <div class="text-[8.5px] text-white font-bold">{feature1Title}</div>
                                        <div class="text-[10px] text-red-500 font-black">{feature1Bold}</div>
                                    </div>
                                    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-2 min-h-[66px]">
                                        <div class="text-red-500 font-bold text-lg mb-1">🔑</div>
                                        <div class="text-[8.5px] text-white font-bold">{feature2Title}</div>
                                        <div class="text-[10px] text-red-500 font-black">{feature2Bold}</div>
                                    </div>
                                    <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-2 min-h-[66px]">
                                        <div class="text-red-500 font-bold text-lg mb-1">🛡️</div>
                                        <div class="text-[8.5px] text-white font-bold">{feature3Title}</div>
                                        <div class="text-[10px] text-red-500 font-black">{feature3Bold}</div>
                                    </div>
                                </div>
                            </div>

                            {/* Stock Box Inferior */}
                            <div class="absolute bottom-[54px] left-0 right-0 z-20 border-t border-zinc-800 bg-zinc-950 px-4 py-1.5 flex justify-between">
                                <div class="text-[9px] font-black text-white">{stockMain}</div>
                                <div class="text-[8.5px] font-black text-zinc-400">{stockQuery}</div>
                            </div>

                            {/* WhatsApp Footer */}
                            <div class="absolute bottom-0 left-0 right-0 z-20">
                                <div class="bg-gradient-to-r from-zinc-900 via-zinc-800 to-zinc-900 border-t border-red-600/30 py-2.5 text-center">
                                    <h4 class="text-white text-xl font-black italic uppercase">💬 {ctaText}</h4>
                                </div>
                                <div class="bg-red-700 text-center py-1 text-[9px] font-black text-white uppercase">{ctaSub}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FlyerGenerator />);
    </script>
</body>
</html>
