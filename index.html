<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Automobili Group - PDF Fusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        .drag-over { border-color: #dc2626 !important; background-color: #450a0a !important; }
        .loader { border-top-color: #dc2626; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen p-3 md:p-8 font-sans text-slate-200">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 z-50 hidden flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12 mb-4"></div>
        <p class="text-red-500 font-bold text-sm tracking-widest uppercase animate-pulse">Procesando...</p>
    </div>

    <div class="max-w-lg mx-auto bg-slate-900 rounded-2xl shadow-2xl p-5 md:p-8 border border-slate-800">
        <h1 class="text-2xl font-black text-white mb-1 uppercase tracking-tight">Automobili Fusion</h1>
        <p class="text-red-600 text-xs font-bold uppercase tracking-widest mb-6">Gestor de Documentos</p>

        <div id="drop-zone" class="border-2 border-dashed border-slate-700 rounded-xl p-6 text-center cursor-pointer transition-all active:scale-[0.98] hover:border-red-600 hover:bg-slate-800/50">
            <svg class="w-10 h-10 mx-auto text-slate-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="text-slate-400 text-sm">Toca para seleccionar o arrastra archivos</p>
            <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.pdf" class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="mt-4 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-bold transition duration-200 uppercase tracking-widest text-xs w-full">Seleccionar</button>
        </div>

        <div id="file-list" class="mt-6 space-y-2"></div>
        
        <div id="controls" class="hidden mt-6 flex justify-between items-center">
            <button onclick="clearAll()" class="text-slate-500 text-xs font-bold hover:text-red-400 transition uppercase">Borrar todo</button>
        </div>

        <div class="mt-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Nombre resultante:</label>
            <input type="text" id="file-name" value="automobili_doc" class="mt-1 block w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition">
        </div>

        <div class="mt-8">
            <button id="merge-btn" disabled class="bg-red-600 hover:bg-red-700 disabled:bg-slate-800 disabled:text-slate-600 text-white px-8 py-4 rounded-xl font-black text-base transition duration-200 disabled:cursor-not-allowed w-full uppercase tracking-widest shadow-lg shadow-red-900/20">
                Unir documentos
            </button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');
        const fileNameInput = document.getElementById('file-name');
        const controls = document.getElementById('controls');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        // Estructura para guardar archivos con su rotación
        let selectedFilesData = [];

        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, (e) => {
                e.preventDefault();
                if (evt === 'dragover') dropZone.classList.add('drag-over');
                else dropZone.classList.remove('drag-over');
            });
        });

        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            for (let file of files) {
                const preview = file.type.startsWith('image/') ? await readFileAsDataURL(file) : null;
                selectedFilesData.push({ file, preview, rotation: 0 });
            }
            updateFileList();
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function updateFileList() {
            fileList.innerHTML = '';
            selectedFilesData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'bg-slate-800 p-3 rounded-lg border border-slate-700 space-y-2';
                
                let previewHtml = item.preview ? 
                    `<img src="${item.preview}" style="transform: rotate(${item.rotation}deg)" class="w-full h-24 object-contain bg-slate-950 rounded">` :
                    `<div class="w-full h-24 flex items-center justify-center bg-slate-950 rounded text-slate-500 font-bold">PDF</div>`;

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-1/3">${previewHtml}</div>
                        <div class="flex-1 truncate text-xs text-slate-300 font-medium">${item.file.name}</div>
                        <div class="flex flex-col gap-1">
                            <button onclick="rotateFile(${index})" class="text-white bg-slate-700 hover:bg-red-600 px-2 py-1 rounded text-[10px]">↻</button>
                            <button onclick="removeFile(${index})" class="text-red-400 p-1">✕</button>
                        </div>
                    </div>
                    <div class="flex justify-between">
                        <button onclick="moveFile(${index}, -1)" class="text-slate-400 text-xs">↑ Mover</button>
                        <button onclick="moveFile(${index}, 1)" class="text-slate-400 text-xs">↓ Mover</button>
                    </div>
                `;
                fileList.appendChild(div);
            });
            mergeBtn.disabled = selectedFilesData.length === 0;
            controls.classList.toggle('hidden', selectedFilesData.length === 0);
        }

        function rotateFile(index) {
            selectedFilesData[index].rotation = (selectedFilesData[index].rotation + 90) % 360;
            updateFileList();
        }

        function moveFile(index, direction) {
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < selectedFilesData.length) {
                [selectedFilesData[index], selectedFilesData[newIndex]] = [selectedFilesData[newIndex], selectedFilesData[index]];
                updateFileList();
            }
        }

        function removeFile(index) {
            selectedFilesData.splice(index, 1);
            updateFileList();
        }

        function clearAll() {
            selectedFilesData = [];
            updateFileList();
        }

        mergeBtn.addEventListener('click', async () => {
            loadingOverlay.classList.remove('hidden');
            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (const item of selectedFilesData) {
                    const arrayBuffer = await item.file.arrayBuffer();
                    if (item.file.type === 'application/pdf') {
                        const pdf = await PDFDocument.load(arrayBuffer);
                        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        pages.forEach(p => mergedPdf.addPage(p));
                    } else if (item.file.type.startsWith('image/')) {
                        const imageBytes = new Uint8Array(arrayBuffer);
                        const img = item.file.type === 'image/png' ? await mergedPdf.embedPng(imageBytes) : await mergedPdf.embedJpg(imageBytes);
                        
                        // Rotar imagen antes de dibujar si es necesario
                        // Nota: pdf-lib no rota imágenes directamente. Para rotar en el PDF, 
                        // deberíamos rotar la página en la que se dibuja.
                        const pageWidth = (item.rotation === 90 || item.rotation === 270) ? img.height : img.width;
                        const pageHeight = (item.rotation === 90 || item.rotation === 270) ? img.width : img.height;
                        const page = mergedPdf.addPage([pageWidth, pageHeight]);
                        
                        page.drawImage(img, {
                            x: item.rotation === 90 ? pageWidth : (item.rotation === 180 ? pageWidth : 0),
                            y: item.rotation === 180 ? pageHeight : (item.rotation === 270 ? pageHeight : 0),
                            width: img.width,
                            height: img.height,
                            rotate: { degrees: item.rotation }
                        });
                    }
                }

                const bytes = await mergedPdf.save();
                const blob = new Blob([bytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = (fileNameInput.value || 'automobili_fusion') + '.pdf';
                link.click();
            } catch (err) {
                console.error(err);
                alert('Error al procesar. Verifica los archivos.');
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
