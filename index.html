<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesa de Trabajo Digital</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .columna { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; height: 400px; display: flex; flex-direction: column; }
        .drop-zone { border: 2px dashed #aaa; padding: 20px; text-align: center; cursor: pointer; flex-grow: 1; margin: 10px 0; }
        button { background: #2563eb; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Mesa de Trabajo</h1>
    <input type="text" id="nombreCliente" placeholder="Nombre del Cliente">
    <div class="grid" id="tablero">
        <!-- Generaremos las 6 columnas aquí -->
    </div>

    <script>
        const tablero = document.getElementById('tablero');
        for (let i = 1; i <= 6; i++) {
            tablero.innerHTML += `
                <div class="columna">
                    <h3>PDF N°${i}</h3>
                    <div class="drop-zone" ondrop="handleDrop(event)" ondragover="allowDrop(event)">
                        Arrastra archivos aquí
                    </div>
                    <button onclick="alert('PDF N°${i} generado para ' + document.getElementById('nombreCliente').value)">Generar PDF</button>
                </div>
            `;
        }
        function allowDrop(e) { e.preventDefault(); }
        function handleDrop(e) { e.preventDefault(); alert("Archivo capturado en la columna"); }
    </script>
</body>
</html>
