<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automobili Group - Generador de Flyers</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="panel">

        <h1>🚗 Generador de Flyers</h1>

        <input id="marca" placeholder="Marca">
        <input id="modelo" placeholder="Modelo">
        <input id="anio" placeholder="Año">
        <input id="precio" placeholder="Precio">
        <input id="anticipo" placeholder="Anticipo">
        <input id="cuota" placeholder="Cuota">

        <select id="tema">
            <option value="deportivo">Deportivo</option>
            <option value="financiacion">Financiación</option>
            <option value="premium">Premium</option>
        </select>

        <input type="file" id="foto" accept="image/*">

        <button onclick="generarFlyer()">
            GENERAR FLYER
        </button>

    </div>

    <div class="preview">

        <div id="flyer" class="flyer deportivo">

            <div class="logo">
                AUTOMOBILI GROUP
            </div>

            <img
                id="imagenAuto"
                class="imagen-auto"
                src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200"
            >

            <div class="contenido">

                <h2 id="tituloMarca">
                    TOYOTA
                </h2>

                <h3 id="tituloModelo">
                    COROLLA
                </h3>

                <div class="datos">

                    <p id="datoAnio">Año: 2024</p>
                    <p id="datoPrecio">Precio: $30.000.000</p>
                    <p id="datoAnticipo">Anticipo: $5.000.000</p>
                    <p id="datoCuota">Cuota: $299.000</p>

                </div>

                <div class="beneficios">

                    <p>✓ Tomamos usado</p>
                    <p>✓ Financiación disponible</p>
                    <p>✓ Entrega pactada</p>

                </div>

                <div class="cta">
                    CONSULTÁ AHORA
                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
