<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Flyers</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
}

.flyer{
    background:linear-gradient(135deg,#dc2626,#991b1b);
}
</style>

</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center p-5">

    <h1 class="text-4xl font-bold mb-8">
        Generador de Flyers
    </h1>

    <div id="flyer-preview"
         class="flyer w-[350px] h-[450px] rounded-xl shadow-2xl p-6 flex flex-col justify-between transition-all">

        <div>
            <h2 id="display-brand"
                class="text-4xl font-black uppercase">
                Toyota
            </h2>

            <h3 id="display-model"
                class="text-2xl mt-2">
                Corolla
            </h3>
        </div>

        <div>
            <p class="text-xl font-bold">
                ¡LISTO PARA VENDER!
            </p>

            <p class="opacity-80 mt-2">
                Financiación disponible
            </p>
        </div>

    </div>

    <div class="mt-8 w-full max-w-md space-y-4">

        <input
            type="text"
            id="brand-input"
            placeholder="Marca"
            class="w-full p-3 rounded text-black">

        <input
            type="text"
            id="model-input"
            placeholder="Modelo"
            class="w-full p-3 rounded text-black">

        <button
            onclick="updateFlyer()"
            class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold">
            ACTUALIZAR FLYER
        </button>

    </div>

</div>

<script>

const brandInput = document.getElementById("brand-input");
const modelInput = document.getElementById("model-input");

brandInput.addEventListener("input", updateFlyer);
modelInput.addEventListener("input", updateFlyer);

function updateFlyer(){

    const brand = brandInput.value.trim();
    const model = modelInput.value.trim();

    document.getElementById("display-brand").textContent =
        brand || "TOYOTA";

    document.getElementById("display-model").textContent =
        model || "COROLLA";
}

</script>

</body>
</html>
