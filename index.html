```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automobili Group - Generador de Flyers</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#111827;
    color:white;
}

.flyer{
    width:400px;
    height:600px;
    position:relative;
    overflow:hidden;
}

.theme-sport{
    background:linear-gradient(180deg,#000000,#7f1d1d);
}

.theme-finance{
    background:linear-gradient(180deg,#1e3a8a,#111827);
}

.theme-used{
    background:linear-gradient(180deg,#374151,#111827);
}

.car-image{
    width:100%;
    height:250px;
    object-fit:cover;
}

.logo{
    position:absolute;
    top:15px;
    right:15px;
    width:80px;
}

</style>
</head>
<body>

<div class="container mx-auto p-6">

    <h1 class="text-4xl font-bold mb-6">
        Generador de Flyers Automobili Group
    </h1>

    <div class="grid md:grid-cols-2 gap-8">

        <div>

            <input
            id="marca"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Marca">

            <input
            id="modelo"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Modelo">

            <input
            id="anio"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Año">

            <input
            id="precio"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Precio">

            <input
            id="anticipo"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Anticipo">

            <input
            id="cuota"
            class="w-full p-3 rounded text-black mb-3"
            placeholder="Cuota">

            <select
            id="theme"
            class="w-full p-3 rounded text-black mb-3">

                <option value="theme-sport">Deportiva</option>
                <option value="theme-finance">Financiación</option>
                <option value="theme-used">Usados</option>

            </select>

            <input
            type="file"
            id="photoUpload"
            accept="image/*"
            class="w-full mb-4">

            <button
            onclick="actualizarFlyer()"
            class="bg-red-600 px-6 py-3 rounded font-bold">
                ACTUALIZAR
            </button>

        </div>

        <div>

            <div
            id="flyer"
            class="flyer theme-sport rounded-xl shadow-2xl">

                <img
                src="logo.png"
                class="logo"
                alt="logo">

                <img
                id="previewImage"
                class="car-image"
                src="https://via.placeholder.com/400x250">

                <div class="p-5">

                    <h2
                    id="previewMarca"
                    class="text-4xl font-black">
                        MARCA
                    </h2>

                    <h3
                    id="previewModelo"
                    class="text-2xl">
                        MODELO
                    </h3>

                    <div class="mt-6 space-y-2">

                        <p id="previewAnio">
                            Año:
                        </p>

                        <p id="previewPrecio">
                            Precio:
                        </p>

                        <p id="previewAnticipo">
                            Anticipo:
                        </p>

                        <p id="previewCuota">
                            Cuota:
                        </p>

                    </div>

                    <div class="mt-8 text-center">

                        <div class="bg-red-600 p-3 rounded font-bold">
                            CONSULTÁ AHORA
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const upload = document.getElementById("photoUpload");

upload.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        document.getElementById("previewImage").src =
        event.target.result;

    };

    reader.readAsDataURL(file);

});

function actualizarFlyer(){

    document.getElementById("previewMarca").innerText =
    document.getElementById("marca").value || "MARCA";

    document.getElementById("previewModelo").innerText =
    document.getElementById("modelo").value || "MODELO";

    document.getElementById("previewAnio").innerText =
    "Año: " + document.getElementById("anio").value;

    document.getElementById("previewPrecio").innerText =
    "Precio: " + document.getElementById("precio").value;

    document.getElementById("previewAnticipo").innerText =
    "Anticipo: " + document.getElementById("anticipo").value;

    document.getElementById("previewCuota").innerText =
    "Cuota: " + document.getElementById("cuota").value;

    document.getElementById("flyer").className =
    "flyer rounded-xl shadow-2xl " +
    document.getElementById("theme").value;
}

</script>

</body>
</html>
```
