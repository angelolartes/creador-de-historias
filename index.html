<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="app" class="p-10 flex flex-col items-center">
        <h1 class="text-3xl font-bold mb-5">Generador de Flyers</h1>
        <div id="flyer-preview" class="w-[300px] h-[400px] bg-red-600 p-5 rounded-lg text-white shadow-xl">
            <h2 id="display-brand" class="text-2xl font-black">MARCA</h2>
            <h3 id="display-model" class="text-xl">MODELO</h3>
            <p class="mt-4 opacity-80">¡LISTO PARA VENDER!</p>
        </div>

        <div class="mt-8 space-y-4 w-full max-w-sm">
            <input type="text" id="brand-input" placeholder="Ingresa la marca" class="w-full p-2 text-black rounded">
            <input type="text" id="model-input" placeholder="Ingresa el modelo" class="w-full p-2 text-black rounded">
            <button onclick="updateFlyer()" class="w-full bg-blue-600 py-3 rounded font-bold">ACTUALIZAR FLYER</button>
        </div>
    </div>

    <script>
        function updateFlyer() {
            const brand = document.getElementById('brand-input').value;
            const model = document.getElementById('model-input').value;
            
            if(brand) document.getElementById('display-brand').innerText = brand;
            if(model) document.getElementById('display-model').innerText = model;
        }
    </script>
</body>
</html>
