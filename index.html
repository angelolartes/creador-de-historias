<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Ventas Automobili Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-6">

    <div class="max-w-md mx-auto bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl">
        <h1 class="text-2xl font-black text-red-600 mb-6 uppercase tracking-tighter">Motor de Venta</h1>
        
        <div class="space-y-4">
            <input type="text" id="marca" placeholder="Marca (Ej: Volkswagen)" class="w-full p-3 bg-black rounded-xl border border-zinc-700">
            <input type="text" id="modelo" placeholder="Modelo (Ej: Taos Highline)" class="w-full p-3 bg-black rounded-xl border border-zinc-700">
            <input type="text" id="precio" placeholder="Precio Contado" class="w-full p-3 bg-black rounded-xl border border-zinc-700">
            <input type="text" id="cuota" placeholder="Valor de Cuota" class="w-full p-3 bg-black rounded-xl border border-zinc-700">
            
            <button onclick="enviarWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-green-900/20">
                ENVIAR POR WHATSAPP 🚀
            </button>
        </div>
    </div>

    <script>
        function enviarWhatsApp() {
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;
            const precio = document.getElementById('precio').value;
            const cuota = document.getElementById('cuota').value;

            const mensaje = `🔥 ¡Oportunidad en Automobili Group! 🔥%0A%0A` +
                            `Vehículo: ${marca} ${modelo}%0A` +
                            `Precio de lista: $${precio}%0A` +
                            `Cuota accesible desde: $${cuota}%0A%0A` +
                            `¿Te gustaría que te mande más fotos o coordinar un test drive?`;

            window.open(`https://wa.me/?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
