<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Automobili Group - PDF Fusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- PDF.js para renderizar miniaturas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .drag-over { border-color: #dc2626 !important; background-color: #450a0a !important; }
        .loader { border-top-color: #dc2626; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 p-3 md:p-8 font-sans text-slate-200">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 z-50 hidden flex flex-col items-center justify-center">
        <div class="loader rounded-full border-4 border-t-4 border-slate-700 h-12 w-12 mb-4"></div>
        <p class="text-red-500 font-bold text-xs uppercase animate-pulse">Procesando...</p>
    </div>

    <div class="max-w-lg mx-auto bg-slate-900 rounded-2xl p-5 border border-slate-800">
        <h1 class="text-xl font-black text-white uppercase">Automobili Fusion</h1>
        <p class="text-red-600 text-[10px] font-bold uppercase mb-6">Gestor de Documentos</p>

        <div id="drop-zone" class="border-2 border-dashed border-slate-700 rounded-xl p-6 text-center cursor-pointer hover:border-red-600 hover:bg-slate-800/50">
            <p class="text-slate-400 text-sm">Toca para seleccionar o arrastra archivos</p>
            <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.pdf" class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="mt-4 bg-red-600 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase w-full">Seleccionar</button>
        </div>

        <div id="file-list" class="mt-6 space-y-2"></div>
        <div class="mt-6">
            <input type="text" id="file-name" value="automobili_doc" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-white">
        </div>
        <button id="merge-btn" disabled class="mt-6 bg-red-600 disabled:bg-slate-800 text-white px-8 py-4 rounded-xl font-black w-full uppercase text-sm">Unir documentos</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let selectedFilesData = [];

        async function handleFiles(files) {
            for (let file of files) {
                let preview = null;
                if (file.type.startsWith('image/')) {
                    preview = await readFileAsDataURL(file);
                } else if (file.type === 'application/pdf') {
                    preview = await getPdfThumbnail(file);
                }
                selectedFilesData.push({ file, preview, rotation: 0 });
            }
            updateFileList();
        }

        async function getPdfThumbnail(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 0.5 });
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            return canvas.toDataURL();
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // ... resto de las funciones (updateFileList, mergePDFs, etc) se mantienen igual ...
        // (Nota: puedes copiar las funciones de lógica del código anterior aquí)
    </script>
</body>
</html>
