<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Flyers</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white">

    <!-- Mensaje de depuración: Si ves esto, el HTML funciona pero React falla -->
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <h1 class="text-xl">Cargando aplicación... Si esto no cambia, revisa la consola del navegador (F12).</h1>
        </div>
    </div>

    <script type="text/babel">
        try {
            const { useState } = React;
            
            function App() {
                return (
                    <div className="p-10">
                        <h1 className="text-4xl font-bold">¡Hola! La aplicación está funcionando.</h1>
                        <p className="mt-4">Si ves este texto, el problema técnico anterior estaba en la carga de los scripts.</p>
                    </div>
                );
            }
            
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            
        } catch (error) {
            document.getElementById('root').innerHTML = `
                <div class="p-10 text-red-500">
                    <h1>Error crítico:</h1>
                    <pre>${error.message}</pre>
                </div>
            `;
        }
    </script>
</body>
</html>
