<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Automobili Group - PDF Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .drag-over { border-color: #dc2626 !important; background-color: #450a0a !important; }
        .loader { border-top-color: #dc2626; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Estilo para cuando arrastras un elemento */
        .sortable-ghost { opacity: 0.4; background: #334155; }
        .sortable-drag { cursor: grabbing; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen p-3 md:p-8 font-sans text-slate-200">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 z-50 hidden flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12 mb-4"></div>
        <p class="text-red-500 font-bold text-sm tracking-widest uppercase animate-pulse">Procesando...</p>
    </div>

    <div class="max-w-lg mx-auto bg-slate-900 rounded-2xl shadow-2xl p-5 md:p-8 border border-slate-800">
        <h1 class="text-2xl font-black text-white mb-1 uppercase tracking-tight">Gestor de Documentos</h1>
        <p class="text-red-600 text-xs font-bold uppercase tracking-widest mb-6">PDF e Imágenes combinadas</p>

        <div id="drop-zone" class="border-2 border-dashed border-slate-700 rounded-xl p-6 text-center cursor-pointer transition-all active:scale-[0.98] hover:border-red-600 hover:bg-slate-800/50">
            <svg class="w-10 h-10 mx-auto text-slate-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="text-slate-400 text-sm">Toca para seleccionar o arrastra archivos</p>
            <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.pdf" class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="mt-4 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-bold transition duration-200 uppercase tracking-widest text-xs w-full">Seleccionar</button>
        </div>

        <div id="file-list" class="mt-6 space-y-2 cursor-move"></div>
        
        <div id="controls" class="hidden mt-6 flex justify-between items-center">
            <button onclick="clearAll()" class="text-slate-500 text-xs font-bold hover:text-red-400 transition uppercase">Borrar todo</button>
        </div>

        <div class="mt-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Nombre resultante:</label>
            <input type="text" id="file-name" value="automobili_doc" class="mt-1 block w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-white focus:ring-2 focus:ring-red-600 focus:border-red-600 outline-none transition">
        </div>

        <div class="mt-8">
            <button id="merge-btn" disabled class="bg-red-600 hover:bg-red-700 disabled:bg-slate-800 disabled:text-slate-600 text-white px-8 py-4 rounded-xl font-black text-base transition duration-200 disabled:cursor-not-allowed w-full uppercase tracking-widest shadow-lg shadow-red-900/20">
                Unir documentos
            </button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');
        
        // Inicializar SortableJS
        new Sortable(fileList, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                // Sincronizar el array con el nuevo orden visual
                const newOrder = [];
                Array.from(fileList.children).forEach(child => {
                    const originalIndex = parseInt(child.dataset.index);
                    newOrder.push(selectedFiles[originalIndex]);
                });
                selectedFiles = newOrder;
                updateFileList(); // Refrescar índices
            }
        });

        let selectedFiles = [];

        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            dropZone.classList.remove('drag-over');
            for (let file of files) {
                let preview = null;
                if (file.type.startsWith('image/')) {
                    preview = await new Promise(r => { const rd = new FileReader(); rd.onload = (e) => r(e.target.result); rd.readAsDataURL(file); });
                } else if (file.type === 'application/pdf') {
                    const ab = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 0.2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    preview = canvas.toDataURL();
                }
                selectedFiles.push({ file, preview });
            }
            updateFileList();
        }

        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((item, index) => {
                const div = document.createElement('div');
                div.dataset.index = index; // Guardamos el índice real
                div.className = 'flex justify-between items-center bg-slate-800 p-3 rounded-lg text-xs border border-slate-700 cursor-move';
                div.innerHTML = `
                    <div class="flex items-center gap-2 truncate">
                        <div class="w-8 h-8 bg-black rounded flex items-center justify-center overflow-hidden">
                            ${item.preview ? `<img src="${item.preview}" class="h-full w-full object-cover">` : '<span class="text-[8px]">PDF</span>'}
                        </div>
                        <span class="truncate font-medium text-slate-200">${item.file.name}</span>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-400 font-bold p-2">✕</button>`;
                fileList.appendChild(div);
            });
            mergeBtn.disabled = selectedFiles.length === 0;
            document.getElementById('controls').classList.toggle('hidden', selectedFiles.length === 0);
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        function clearAll() {
            selectedFiles = [];
            updateFileList();
        }

        mergeBtn.addEventListener('click', async () => {
            document.getElementById('loading-overlay').classList.remove('hidden');
            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();
                for (const item of selectedFiles) {
                    const arrayBuffer = await item.file.arrayBuffer();
                    if (item.file.type === 'application/pdf') {
                        const pdf = await PDFDocument.load(arrayBuffer);
                        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        pages.forEach(p => mergedPdf.addPage(p));
                    } else if (item.file.type.startsWith('image/')) {
                        const imageBytes = new Uint8Array(arrayBuffer);
                        const img = item.file.type === 'image/png' ? await mergedPdf.embedPng(imageBytes) : await mergedPdf.embedJpg(imageBytes);
                        const page = mergedPdf.addPage([img.width, img.height]);
                        page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                    }
                }
                const bytes = await mergedPdf.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
                link.download = (document.getElementById('file-name').value || 'automobili_doc') + '.pdf';
                link.click();
            } catch (err) { alert('Error al procesar.'); }
            document.getElementById('loading-overlay').classList.add('hidden');
        });
    </script>
</body>
</html>
