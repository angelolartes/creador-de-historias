<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Automobili Group - Generador de Flyers</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#111827;
}

.flyer{
    width:400px;
    height:700px;
    overflow:hidden;
    transition:.3s;
}

.deportivo{
    background:linear-gradient(180deg,#000000,#7f1d1d);
    color:white;
}

.financiacion{
    background:linear-gradient(180deg,#0f172a,#1d4ed8);
    color:white;
}

.premium{
    background:linear-gradient(180deg,#1f2937,#111827);
    color:white;
}

.auto-img{
    width:100%;
    height:260px;
    object-fit:cover;
}

</style>

</head>
<body>

<div class="max-w-7xl mx-auto p-6">

    <h1 class="text-4xl font-bold text-white mb-8">
        Generador de Flyers Automobili Group
    </h1>

    <div class="grid md:grid-cols-2 gap-10">

        <!-- PANEL -->

        <div class="bg-gray-900 p-6 rounded-xl">

            <input id="marca"
            class="w-full p-3 rounded mb-3"
            placeholder="Marca">

            <input id="modelo"
            class="w-full p-3 rounded mb-3"
            placeholder="Modelo">

            <input id="anio"
            class="w-full p-3 rounded mb-3"
            placeholder="Año">

            <input id="precio"
            class="w-full p-3 rounded mb-3"
            placeholder="Precio">

            <input id="anticipo"
            class="w-full p-3 rounded mb-3"
            placeholder="Anticipo">

            <input id="cuota"
            class="w-full p-3 rounded mb-3"
            placeholder="Cuota">

            <select id="tema"
            class="w-full p-3 rounded mb-3">

                <option value="deportivo">Deportivo</option>
                <option value="financiacion">Financiación</option>
                <option value="premium">Premium</option>

            </select>

            <input
            type="file"
            id="foto"
            accept="image/*"
            class="w-full bg-white p-2 rounded">

            <button
            onclick="actualizarFlyer()"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded mt-4">
                ACTUALIZAR FLYER
            </button>

        </div>

        <!-- FLYER -->

        <div class="flex justify-center">

            <div
            id="flyer"
            class="flyer deportivo rounded-xl shadow-2xl">

                <img
                id="imagenAuto"
                class="auto-img"
                src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200">

                <div class="p-6">

                    <div class="text-right text-sm font-bold">
                        AUTOMOBILI GROUP
                    </div>

                    <h2
                    id="fMarca"
                    class="text-4xl font-black mt-3">
                        TOYOTA
                    </h2>

                    <h3
                    id="fModelo"
                    class="text-2xl">
                        COROLLA
                    </h3>

                    <div class="mt-6 space-y-2">

                        <p id="fAnio">
                            Año: 2024
                        </p>

                        <p id="fPrecio">
                            Precio: $30.000.000
                        </p>

                        <p id="fAnticipo">
                            Anticipo: $5.000.000
                        </p>

                        <p id="fCuota">
                            Cuota: $299.000
                        </p>

                    </div>

                    <div class="mt-10">

                        <div class="bg-red-600 text-center py-4 rounded-lg font-bold text-xl">
                            CONSULTÁ AHORA
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const fotoInput = document.getElementById("foto");

fotoInput.addEventListener("change", function(e){

    const archivo = e.target.files[0];

    if(!archivo) return;

    const reader = new FileReader();

    reader.onload = function(event){

        document.getElementById("imagenAuto").src =
        event.target.result;

    };

    reader.readAsDataURL(archivo);

});

function actualizarFlyer(){

    document.getElementById("fMarca").innerText =
    document.getElementById("marca").value || "TOYOTA";

    document.getElementById("fModelo").innerText =
    document.getElementById("modelo").value || "COROLLA";

    document.getElementById("fAnio").innerText =
    "Año: " +
    (document.getElementById("anio").value || "-");

    document.getElementById("fPrecio").innerText =
    "Precio: " +
    (document.getElementById("precio").value || "-");

    document.getElementById("fAnticipo").innerText =
    "Anticipo: " +
    (document.getElementById("anticipo").value || "-");

    document.getElementById("fCuota").innerText =
    "Cuota: " +
    (document.getElementById("cuota").value || "-");

    const flyer = document.getElementById("flyer");

    flyer.classList.remove(
        "deportivo",
        "financiacion",
        "premium"
    );

    flyer.classList.add(
        document.getElementById("tema").value
    );

}

</script>

</body>
</html>
